name: Test TypeScript Action

on:
  push:
    branches-ignore:
      - 'docs/**'
      - 'gh-pages'
  pull_request:
  workflow_dispatch:

jobs:
  unit-tests:
    name: Unit Tests (Node.js 24)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: "Install/Test"
        run: |
          npm ci
          npm run test:coverage

      - name: Build
        run: |
          npm run build

      - uses: SonarSource/sonarqube-scan-action@v7.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  test-action:
    name: "Test Action (${{ matrix.os }}, Node.js ${{ matrix.node-version }})"
    runs-on: ${{ matrix.os }}
    needs: unit-tests
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: ['20', '24']
      fail-fast: false
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: "Install/Build"
        run: |
          npm install
          npm run build

      - name: "Test Action — text output"
        uses: ./
        with:
          filename: 'src/coverage.cobertura.xml'
          badge: 'true'
          format: 'text'
          output: 'console'
          thresholds: '60 80'

      - name: "Test Action — markdown output"
        uses: ./
        with:
          filename: 'src/coverage.aggregate-*.xml'
          badge: 'true'
          fail_below_min: 'false'
          format: 'markdown'
          hide_complexity: 'true'
          indicators: 'true'
          output: 'console'
          thresholds: '50 75'

      - name: "Test Action — compatibility fixtures"
        uses: ./
        with:
          filename: >-
            src/coverage.MATLAB.xml,
            src/coverage.gcovr.xml,
            src/coverage.simplecov.xml,
            src/coverage.cobertura.xml
          badge: 'true'
          fail_below_min: 'false'
          format: 'markdown'
          hide_complexity: 'true'
          indicators: 'true'
          output: 'console'
          thresholds: '50 75'

      - name: "Test Action — edge-case fixtures"
        uses: ./
        with:
          filename: >-
            src/coverage.no-branches.xml,
            src/coverage.no-packages.xml,
            src/coverage.unnamed-packages.xml
          badge: 'false'
          fail_below_min: 'false'
          format: 'markdown'
          hide_complexity: 'false'
          indicators: 'true'
          output: 'console'
          thresholds: '50 75'
