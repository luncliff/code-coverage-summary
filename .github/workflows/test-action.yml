name: Test TypeScript Action

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit Tests (Node.js ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['20', '24']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build dist
        run: npm run build

  test-action:
    name: Test Action (${{ matrix.os }}, Node.js ${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}
    needs: unit-tests
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: ['20', '24']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build dist
        run: npm run build

      - name: Test Action — text output
        uses: ./
        with:
          filename: 'src/coverage.cobertura.xml'
          badge: 'true'
          format: 'text'
          output: 'console'
          thresholds: '60 80'

      - name: Test Action — markdown output
        uses: ./
        with:
          filename: 'src/coverage.*.xml'
          badge: 'true'
          fail_below_min: 'false'
          format: 'markdown'
          hide_complexity: 'true'
          indicators: 'true'
          output: 'console'
          thresholds: '50 75'

