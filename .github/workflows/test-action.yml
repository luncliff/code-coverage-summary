name: Test TypeScript Action

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build dist
        run: npm run build

  test-linux:
    name: Test Action on Linux
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build dist
        run: npm run build

      - name: Test Action — text output
        uses: ./
        with:
          filename: 'src/coverage.cobertura.xml'
          badge: 'true'
          format: 'text'
          output: 'console'
          thresholds: '60 80'

      - name: Test Action — markdown output
        uses: ./
        with:
          filename: 'src/coverage.*.xml'
          badge: 'true'
          fail_below_min: 'false'
          format: 'markdown'
          hide_complexity: 'true'
          indicators: 'true'
          output: 'console'
          thresholds: '50 75'

  test-windows:
    name: Test Action on Windows
    runs-on: windows-latest
    needs: unit-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build dist
        run: npm run build

      - name: Test Action — text output
        uses: ./
        with:
          filename: 'src/coverage.cobertura.xml'
          format: 'text'
          output: 'console'
          thresholds: '60 80'

  test-macos:
    name: Test Action on macOS
    runs-on: macos-latest
    needs: unit-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build dist
        run: npm run build

      - name: Test Action — text output
        uses: ./
        with:
          filename: 'src/coverage.cobertura.xml'
          format: 'text'
          output: 'console'
          thresholds: '60 80'
