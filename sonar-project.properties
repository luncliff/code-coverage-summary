sonar.projectKey=luncliff-code-coverage-summary
sonar.organization=luncliff

# Project metadata
sonar.projectName=code-coverage-summary
sonar.projectVersion=2.0.0

# Sources — include only TypeScript implementation, exclude original C# sources
sonar.sources=src
sonar.inclusions=src/**/*.ts
sonar.exclusions=src/CodeCoverageSummary/**,src/CodeCoverageSummary.sln,src/coverage*.xml,src/coverage-04.dtd

# Tests
sonar.tests=__tests__
sonar.test.inclusions=__tests__/**/*.test.ts

# Language
sonar.language=ts

# Coverage — LCOV report generated by Jest
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8
